<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <link rel="icon" href="道輝1.png" type="image/png">
    <meta charset="UTF-8">
    <title>寶光音樂會 - 天法五十</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        /* 升級版：更有感的浮現與模糊效果 */
        .fade-in-section {
            opacity: 0;
            transform: translateY(80px);
            /* 距離拉長到 80px，更有感 */
            filter: blur(8px);
            /* 增加模糊度 */
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        h1,
        h2,
        .serif {
            font-family: 'Noto Serif TC', serif;
        }

        body {
            font-family: 'Noto Sans TC';
            background: #fdfcf8;
        }

        .nav-link {
            background: linear-gradient(90deg, #8B6508, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-800">
    <nav class="p-6 bg-stone-950 shadow-xl flex justify-between sticky top-0 z-50"><a href="index.html" class="nav-link font-bold">←
            返回首頁</a></nav>

    <main class="fade-in-sectionmax-w-5xl mx-auto py-24 px-6">
        <div
            class="bg-white p-12 shadow-2xl rounded-sm border-t-8 border-yellow-600 border border-stone-100 relative overflow-hidden">
            <div class="absolute -bottom-20 -right-20 w-60 h-60 bg-yellow-100/30 rounded-full blur-3xl"></div>

            <div class="relative z-10 space-y-12">
                <header class="text-center space-y-4">
                    <p class="text-yellow-800 tracking-[0.5em] text-sm">FIFTY YEARS | GRAND PUJA</p>
                    <h1 class="text-4xl md:text-5xl font-bold text-stone-950 serif tracking-widest">寶光音樂會</h1>
                    <div class="w-20 h-[2px] bg-yellow-700/50 mx-auto mt-6"></div>
                </header>

                <div class="grid md:grid-cols-2 gap-8 text-lg font-medium tracking-wide">
                    <div class="flex items-center p-6 bg-stone-100 border-l-4 border-yellow-700 rounded-sm">
                        <span class="text-3xl mr-4">📅</span>
                        <div>
                            <p class="text-xs text-gray-500 mb-1">活動日期 DATE</p><span>2026年8月16日 (農曆七月初四日)</span>
                        </div>
                    </div>
                    <div class="flex items-center p-6 bg-stone-100 border-l-4 border-yellow-700 rounded-sm">
                        <span class="text-3xl mr-4">📍</span>
                        <div>
                            <p class="text-xs text-gray-500 mb-1">活動地點 LOCATION</p><span>本寺景德大樓五樓大禮堂</span>
                        </div>
                    </div>
                </div>

                <article class="prose prose-stone max-w-none leading-loose text-gray-700 text-lg space-y-6">
                    <p class="italic text-yellow-900/80">「以此功德，迴向眾生。法界安寧，世界和平。」</p>
                    <p>本次五十週年感恩祈福大法會，將邀請國內外多位高僧大德共同主持。法會將進行一日的開示、誦經與祈福儀式。當晚將舉行盛大的傳燈儀式，象徵佛光普照，智慧代代相傳。</p>
                    <p>誠摯邀請十方信眾共同參與，共襄盛舉，同霑法益。</p>
                    <img src="https://picsum.photos/1000/500?random=Puja"
                        class="w-full rounded-sm shadow-xl border border-stone-200 mt-10">
                </article>
            </div>
        </div>
    </main>
    <footer class="py-20 text-center bg-stone-900 text-stone-500 text-sm">
        <p>天法五十 · 寶光永耀</p>
        <a href="index.html" class="mt-4 inline-block text-yellow-600 hover:text-yellow-400 transition">BACK TO HOME</a>
    </footer>

    <script>
        (function() {
            // 自動幫所有 section 和 main 加上動畫初始類名
            const revealElements = document.querySelectorAll('main, section, .reveal');
            revealElements.forEach(el => el.classList.add('fade-in-section'));

            const observerOptions = {
                threshold: 0.05,
                rootMargin: "0px 0px -100px 0px"
            };

            const myObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, observerOptions);

            revealElements.forEach(el => myObserver.observe(el));
        })();
    </script>
</body>

</html>
